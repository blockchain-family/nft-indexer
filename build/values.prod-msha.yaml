env:
  RUST_LOG: "INFO"
  RUST_BACKTRACE: "1"
  DATABASE_MAX_CONNECTIONS: "5"
  KAFKA_CONSUMER_GROUP: "nft-indexer-msha"
  KAFKA_TOPIC: "msha-raw-transactions"
  KAFKA_SETTINGS__BOOTSTRAP_SERVERS: "kafka-f8ec3b33-o1174e556.database.cloud.ovh.net:20186"
  KAFKA_SETTINGS__SECURITY_PROTOCOL: "SSL"
  KAFKA_SETTINGS__SSL_CA_LOCATION: "/tmp/ca.pem"
  KAFKA_SETTINGS__SSL_KEY_LOCATION: "/tmp/service.key"
  KAFKA_SETTINGS__SSL_CERTIFICATE_LOCATION: "/tmp/service.crt"
  STATES_RPC_ENDPOINTS: "https://rpc.msharia.io/"
  JRPC_REQ_LATENCY_MILLIS: "0"
  SERVER_API_URL: "0.0.0.0:3001"
  IDLE_AFTER_PRICE_LOOP_SEC: "100"
  IDLE_AFTER_META_LOOP_SEC: "100"
  PRICE_UPDATE_FREQUENCY_SEC: "180"
  BC_NAME: "Tycho"
  DEX_HOST_URL: "https://api-test-tycho.flatqube.io"

controller: statefulset

service:
  port: 3001

containerCommand:
  - /bin/sh
  - -ec

containerArguments:
  - |
    . /vault/secrets/config
    export DATABASE_URL="postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@10.163.10.14:5432/nft-indexer-msha"
    exec /app/entrypoint.sh

vault:
  enabled: true
  role: "nft-nft-indexer-msha"
  file:
    name: config
    path: kubernetes/data/broxus/main/nft-msha/nft-indexer
    template: |
      {{- with secret "kubernetes/data/broxus/main/nft-msha/nft-indexer" -}}
      {{- range $k, $v := .Data.data }}
      export {{ $k }}={{ printf "%q" $v }}
      {{- end }}
      {{- end -}}

podSecurityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

gateway:
  enabled: false
